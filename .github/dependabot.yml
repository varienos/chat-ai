version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      root-npm:
        patterns:
          - "*"
  - package-ecosystem: npm
    directory: /deck
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      deck-npm:
        patterns:
          - "*"
  - package-ecosystem: npm
    directory: /widget
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      widget-npm:
        patterns:
          - "*"
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly

