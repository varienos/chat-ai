name: Bug report
description: Report a reproducible problem in the gateway, widget, Deck, or deployment assets.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Do not include secrets, auth JSON, `.env` values, session dumps, or customer data.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
      placeholder: Describe the problem and the affected surface.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Gateway API
        - Widget
        - Deck admin panel
        - Provider integration
        - Docker / Coolify deployment
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the exact commands, requests, or UI steps.
      placeholder: |
        1. Run ...
        2. Send ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version / commit
      placeholder: v0.1.0 or commit SHA
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include OS, Node version, Docker version, browser, and deployment target when relevant.
      placeholder: |
        OS:
        Node:
        Docker:
        Browser:
        Deployment:
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Redact tokens, cookies, auth JSON, IPs, and customer data.
      render: shell

